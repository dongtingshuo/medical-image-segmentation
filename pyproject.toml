[tool.ruff]
target-version = "py310"
line-length = 120
exclude = [
  "kaggle_outputs",
  "kaggle_debug_kernel",
  "kaggle_baseline_unet_kernel",
  "kaggle_high_accuracy_kernel",
  "kaggle_project_dataset",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501", "B905"]

[tool.ruff.lint.per-file-ignores]
"notebooks/*" = ["E402"]

[tool.pyright]
pythonVersion = "3.10"
include = ["src", "scripts", "tests", "train.py", "evaluate.py", "predict.py", "batch_predict.py", "export.py", "app.py"]
exclude = ["kaggle_outputs", "kaggle_*_kernel", "kaggle_project_dataset"]
