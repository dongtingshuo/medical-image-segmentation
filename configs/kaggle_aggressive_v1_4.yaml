# Kaggle aggressive v1.4 base config.
# The v1.4 runner writes stage-specific runtime configs with real /kaggle/working paths.
experiment_name: kaggle_aggressive_v1_4
seed: 42
reproducibility:
  deterministic: true
device: auto
require_gpu: true
mixed_precision: true

inference:
  threshold: 0.40

data:
  train_images_dir: /kaggle/working/prepared_data/internal/train/images
  train_masks_dir: /kaggle/working/prepared_data/internal/train/masks
  val_images_dir: /kaggle/working/prepared_data/internal/val/images
  val_masks_dir: /kaggle/working/prepared_data/internal/val/masks
  test_images_dir: /kaggle/working/prepared_data/internal/test/images
  test_masks_dir: /kaggle/working/prepared_data/internal/test/masks
  external_images_dir: /kaggle/working/prepared_data/external/images
  external_masks_dir: /kaggle/working/prepared_data/external/masks
  image_size: 448

model:
  model_name: unet_plus_plus
  in_channels: 3
  out_channels: 1
  encoder_name: efficientnet-b4
  encoder_weights: imagenet

training:
  batch_size: 4
  gradient_accumulation_steps: 2
  epochs: 24
  lr: 8.0e-5
  optimizer: adamw
  scheduler: cosine
  loss_name: bce_dice
  num_workers: 2
  max_runtime_minutes: 690
  safe_stop_minutes: 25
  resume_optimizer: true
  resume_training_state: true
  early_stopping:
    enabled: true
    patience: 6
    monitor: val_dice
    mode: max

loss:
  name: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotate: true
  color_jitter: true
  low_contrast:
    enabled: true
    clahe: true
    clahe_p: 0.35
    clahe_clip_limit: [1.0, 4.0]
    clahe_tile_grid_size: [8, 8]
    random_gamma: true
    gamma_p: 0.35
    gamma_limit: [70, 130]
    brightness_contrast: true
    brightness_contrast_p: 0.45
    brightness_limit: 0.18
    contrast_limit: 0.35
    simulate_low_contrast: true
    simulate_p: 0.35
    simulate_brightness_limit: [-0.05, 0.05]
    simulate_contrast_limit: [-0.50, -0.15]

paths:
  output_dir: /kaggle/working/research_v1_4_aggressive/preflight
  checkpoint_dir: /kaggle/working/research_v1_4_aggressive/preflight_checkpoints
