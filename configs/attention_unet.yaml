experiment_name: attention_unet
seed: 42
reproducibility:
  deterministic: true
device: auto
mixed_precision: true

data:
  train_images_dir: data/images/train
  train_masks_dir: data/masks/train
  val_images_dir: data/images/val
  val_masks_dir: data/masks/val
  image_size: 256

model:
  name: attention_unet
  model_name: attention_unet
  encoder: null
  in_channels: 3
  out_channels: 1

loss:
  name: bce_dice

training:
  batch_size: 8
  epochs: 20
  lr: 1.0e-4
  optimizer: adam
  scheduler: reduce_on_plateau
  loss_name: bce_dice
  num_workers: 2
  early_stopping:
    enabled: true
    patience: 8
    monitor: val_dice
    mode: max

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotate: true
  color_jitter: true

paths:
  output_dir: outputs
  checkpoint_dir: checkpoints
