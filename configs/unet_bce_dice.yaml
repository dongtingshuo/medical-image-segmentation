experiment_name: unet_bce_dice
seed: 42
device: auto
mixed_precision: true
data:
  train_images_dir: data/images/train
  train_masks_dir: data/masks/train
  val_images_dir: data/images/val
  val_masks_dir: data/masks/val
  image_size: 256
model:
  model_name: unet
  in_channels: 3
  out_channels: 1
training:
  batch_size: 8
  epochs: 20
  lr: 1.0e-4
  optimizer: adam
  scheduler: reduce_on_plateau
  loss_name: bce_dice
  num_workers: 2
  early_stopping:
    enabled: true
    patience: 8
    monitor: val_dice
    mode: max
augmentation:
  enabled: true
paths:
  output_dir: outputs
  checkpoint_dir: checkpoints

