experiment_name: final_high_accuracy_unetplusplus_effb3
seed: 42
reproducibility:
  deterministic: true
device: auto
require_gpu: false
mixed_precision: false

data:
  train_images_dir: data/images/train
  train_masks_dir: data/masks/train
  val_images_dir: data/images/val
  val_masks_dir: data/masks/val
  # Optional independent evaluation split:
  # test_images_dir: data/images/test
  # test_masks_dir: data/masks/test
  image_size: 384

model:
  model_name: unet_plus_plus
  in_channels: 3
  out_channels: 1
  encoder_name: efficientnet-b3
  encoder_weights: null

training:
  batch_size: 8
  epochs: 50
  lr: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  loss_name: bce_dice
  num_workers: 2
  early_stopping:
    enabled: true
    patience: 10
    monitor: val_dice
    mode: max

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotate: true
  color_jitter: true

paths:
  output_dir: outputs
  checkpoint_dir: checkpoints
