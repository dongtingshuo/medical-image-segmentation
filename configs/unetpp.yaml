experiment_name: unetpp_local
seed: 42
device: auto
mixed_precision: true

data:
  train_images_dir: data/images/train
  train_masks_dir: data/masks/train
  val_images_dir: data/images/val
  val_masks_dir: data/masks/val
  image_size: 384

model:
  name: unet_plus_plus
  model_name: unet_plus_plus
  encoder: efficientnet-b3
  encoder_name: efficientnet-b3
  encoder_weights: imagenet
  in_channels: 3
  out_channels: 1

loss:
  name: bce_dice

training:
  batch_size: 4
  epochs: 30
  lr: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  loss_name: bce_dice
  num_workers: 2
  early_stopping:
    enabled: true
    patience: 10
    monitor: val_dice
    mode: max

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotate: true
  color_jitter: true

paths:
  output_dir: outputs
  checkpoint_dir: checkpoints
