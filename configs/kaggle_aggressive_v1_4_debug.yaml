# Kaggle aggressive v1.4 debug config.
experiment_name: kaggle_aggressive_v1_4_debug
seed: 42
reproducibility:
  deterministic: true
device: auto
require_gpu: true
mixed_precision: true

inference:
  threshold: 0.40

data:
  train_images_dir: /kaggle/working/prepared_data/internal/train/images
  train_masks_dir: /kaggle/working/prepared_data/internal/train/masks
  val_images_dir: /kaggle/working/prepared_data/internal/val/images
  val_masks_dir: /kaggle/working/prepared_data/internal/val/masks
  test_images_dir: /kaggle/working/prepared_data/internal/test/images
  test_masks_dir: /kaggle/working/prepared_data/internal/test/masks
  external_images_dir: /kaggle/working/prepared_data/external/images
  external_masks_dir: /kaggle/working/prepared_data/external/masks
  image_size: 256

model:
  model_name: unet_plus_plus
  in_channels: 3
  out_channels: 1
  encoder_name: efficientnet-b3
  encoder_weights: imagenet

training:
  batch_size: 2
  gradient_accumulation_steps: 1
  epochs: 2
  lr: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  loss_name: bce_dice
  num_workers: 2
  max_train_batches: 2
  max_val_batches: 2
  max_runtime_minutes: 60
  safe_stop_minutes: 5
  early_stopping:
    enabled: false
    patience: 2
    monitor: val_dice
    mode: max

loss:
  name: bce_dice

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotate: true
  color_jitter: true
  low_contrast:
    enabled: true
    simulate_low_contrast: true

paths:
  output_dir: /kaggle/working/research_v1_4_aggressive/debug
  checkpoint_dir: /kaggle/working/research_v1_4_aggressive/debug_checkpoints
