experiment_name: kaggle_v1_6
seed: 42
reproducibility:
  deterministic: false
device: auto
require_gpu: true
mixed_precision: true

data:
  image_size: 384
  resize_mode: letterbox

model:
  model_name: unet_plus_plus
  in_channels: 3
  out_channels: 1
  encoder_name: efficientnet-b3
  encoder_weights: imagenet

training:
  batch_size: 6
  gradient_accumulation_steps: 2
  epochs: 30
  lr: 1.0e-4
  encoder_lr: 2.0e-5
  decoder_lr: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  scheduler: warmup_cosine
  warmup_epochs: 2
  gradient_clip_norm: 1.0
  num_workers: 2
  max_runtime_minutes: 570
  safe_stop_minutes: 30
  resume_optimizer: true
  resume_training_state: true
  ema:
    enabled: true
    decay: 0.999
  early_stopping:
    enabled: true
    patience: 6
    monitor: val_dice
    mode: max

loss:
  name: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5

augmentation:
  enabled: true
  strategy: controlled
  horizontal_flip: true
  vertical_flip: true
  geometry_p: 0.55
  photometric_p: 0.65
  artifact_p: 0.20

tracking:
  enabled: false
  mode: disabled

paths:
  output_dir: outputs/v1_6_runtime
  checkpoint_dir: checkpoints/v1_6_runtime
