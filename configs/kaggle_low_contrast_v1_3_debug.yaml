# Kaggle low-contrast v1.3 debug config.
# Use this for smoke testing before the full v1.3 run.
experiment_name: kaggle_low_contrast_v1_3_debug
seed: 42
reproducibility:
  deterministic: true
device: auto
require_gpu: true
mixed_precision: true

inference:
  threshold: 0.35

data:
  train_images_dir: /kaggle/working/prepared_data/internal/train/images
  train_masks_dir: /kaggle/working/prepared_data/internal/train/masks
  val_images_dir: /kaggle/working/prepared_data/internal/val/images
  val_masks_dir: /kaggle/working/prepared_data/internal/val/masks
  test_images_dir: /kaggle/working/prepared_data/internal/test/images
  test_masks_dir: /kaggle/working/prepared_data/internal/test/masks
  external_images_dir: /kaggle/working/prepared_data/external/images
  external_masks_dir: /kaggle/working/prepared_data/external/masks
  image_size: 256

model:
  model_name: unet_plus_plus
  in_channels: 3
  out_channels: 1
  encoder_name: efficientnet-b3
  encoder_weights: imagenet

training:
  batch_size: 4
  epochs: 2
  lr: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  loss_name: bce_dice
  num_workers: 2
  early_stopping:
    enabled: true
    patience: 2
    monitor: val_dice
    mode: max

loss:
  name: bce_dice

augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotate: true
  color_jitter: true
  low_contrast:
    enabled: true
    clahe: true
    clahe_p: 0.20
    random_gamma: true
    gamma_p: 0.20
    brightness_contrast: true
    brightness_contrast_p: 0.30
    simulate_low_contrast: true
    simulate_p: 0.20

paths:
  output_dir: /kaggle/working/research_v1_3_low_contrast/debug
  checkpoint_dir: /kaggle/working/research_v1_3_low_contrast/debug_checkpoints
